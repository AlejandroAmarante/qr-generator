<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator</title>
    <link rel="stylesheet" href="./css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="imgs/qr-code-line.svg">

    <script src="./lib/qrcore.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="container">

        <main>
            <div class="qr-generator">
                <div class="form-container">
                    <div class="form-group">
                        <label>QR Code Type</label>
                        <div class="qr-type-buttons">
                            <div class="button-row">
                                <button type="button" class="type-btn active" data-type="url">
                                    <i data-lucide="link" aria-hidden="true"></i> URL
                                </button>
                                <button type="button" class="type-btn" data-type="text">
                                    <i data-lucide="text" aria-hidden="true"></i> Text
                                </button>
                                <button type="button" class="type-btn" data-type="email">
                                    <i data-lucide="mail" aria-hidden="true"></i> Email
                                </button>
                                <button type="button" class="type-btn" data-type="phone">
                                    <i data-lucide="phone" aria-hidden="true"></i> Phone
                                </button>
                            </div>
                            <div class="button-row">
                                <button type="button" class="type-btn" data-type="sms">
                                    <i data-lucide="message-circle" aria-hidden="true"></i> SMS
                                </button>
                                <button type="button" class="type-btn" data-type="wifi">
                                    <i data-lucide="wifi" aria-hidden="true"></i> WiFi
                                </button>
                                <button type="button" class="type-btn" data-type="vcard">
                                    <i data-lucide="user" aria-hidden="true"></i> vCard
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Dynamic form fields (will change based on QR type) -->
                    <div id="dynamic-fields">
                        <!-- Default URL form -->
                        <div id="url-fields" class="qr-type-fields">
                            <div class="form-group">
                                <label for="url-input">URL<span class="required"> *</span></label>
                                <input type="url" id="url-input" placeholder="https://example.com" required
                                    autocomplete="off">
                            </div>
                        </div>

                        <!-- Text form -->
                        <div id="text-fields" class="qr-type-fields hidden">
                            <div class="form-group">
                                <label for="text-input">Text<span class="required"> *</span></label>
                                <textarea id="text-input" placeholder="Enter your text here"
                                    autocomplete="off"></textarea>
                            </div>
                        </div>

                        <!-- Email form -->
                        <div id="email-fields" class="qr-type-fields hidden">
                            <div class="form-group">
                                <label for="email-address">Email Address<span class="required"> *</span></label>
                                <input type="email" id="email-address" placeholder="email@example.com"
                                    autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="email-subject">Subject</label>
                                <input type="text" id="email-subject" placeholder="Email subject" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="email-body">Body</label>
                                <textarea id="email-body" placeholder="Email content" autocomplete="off"></textarea>
                            </div>
                        </div>

                        <!-- Phone form -->
                        <div id="phone-fields" class="qr-type-fields hidden">
                            <div class="form-group">
                                <label for="phone-input">Phone Number<span class="required"> *</span></label>
                                <input type="tel" id="phone-input" placeholder="+1234567890" autocomplete="off">
                            </div>
                        </div>

                        <!-- SMS form -->
                        <div id="sms-fields" class="qr-type-fields hidden">
                            <div class="form-group">
                                <label for="sms-number">Phone Number<span class="required"> *</span></label>
                                <input type="tel" id="sms-number" placeholder="+1234567890" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="sms-message">Message</label>
                                <textarea id="sms-message" placeholder="SMS message" autocomplete="off"></textarea>
                            </div>
                        </div>

                        <!-- WiFi form -->
                        <div id="wifi-fields" class="qr-type-fields hidden">
                            <div class="form-group">
                                <label for="wifi-ssid">Network Name (SSID)<span class="required"> *</span></label>
                                <input type="text" id="wifi-ssid" placeholder="WiFi Network Name" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="wifi-password">Password</label>
                                <input type="password" id="wifi-password" placeholder="WiFi Password"
                                    autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="wifi-encryption">Encryption<span class="required"> *</span></label>
                                <select id="wifi-encryption" autocomplete="off">
                                    <option value="WPA">WPA/WPA2</option>
                                    <option value="WEP">WEP</option>
                                    <option value="nopass">None</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="wifi-hidden">Hidden Network</label>
                                <input type="checkbox" id="wifi-hidden" autocomplete="off">
                            </div>
                        </div>

                        <!-- vCard form -->
                        <div id="vcard-fields" class="qr-type-fields hidden">
                            <div class="form-group">
                                <label for="vcard-name">Full Name<span class="required"> *</span></label>
                                <input type="text" id="vcard-name" placeholder="John Doe" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="vcard-company">Company</label>
                                <input type="text" id="vcard-company" placeholder="Company Name" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="vcard-title">Job Title</label>
                                <input type="text" id="vcard-title" placeholder="Software Developer" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="vcard-phone">Phone Number<span class="required"> *</span></label>
                                <input type="tel" id="vcard-phone" placeholder="+1234567890" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="vcard-email">Email<span class="required"> *</span></label>
                                <input type="email" id="vcard-email" placeholder="email@example.com" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="vcard-website">Website</label>
                                <input type="url" id="vcard-website" placeholder="https://example.com"
                                    autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="vcard-address">Address</label>
                                <input type="text" id="vcard-address" placeholder="123 Main St, City, Country"
                                    autocomplete="off">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="qr-error-correction-level">Error Correction Level</label>
                        <select id="qr-error-correction-level" autocomplete="off">
                            <option value="A" selected>Automatic (H → Q → M → L)</option>
                            <option value="H">High (30% of codewords can be restored)</option>
                            <option value="Q">Quartile (25% of codewords can be restored)</option>
                            <option value="M">Medium (15% of codewords can be restored)</option>
                            <option value="L">Low (7% of codewords can be restored)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="qr-size">Size</label>
                        <select id="qr-size" autocomplete="off">
                            <option value="150">Small (150x150)</option>
                            <option value="200" selected>Medium (200x200)</option>
                            <option value="300">Large (300x300)</option>
                            <option value="400">Extra Large (400x400)</option>
                        </select>
                    </div>

                    <div class="form-group flex-row">
                        <div class="form-group">
                            <label for="qr-color">Foreground Color</label>
                            <input type="color" id="qr-color" value="#000000" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="qr-bgcolor">Background Color</label>
                            <input type="color" id="qr-bgcolor" value="#FFFFFF" autocomplete="off">
                        </div>
                    </div>

                    <!-- ── Module Shape ──────────────────────────────────── -->
                    <div class="form-group">
                        <label>Module Shape</label>
                        <div class="shape-selector">
                            <button type="button" class="shape-btn active" data-shape="square" title="Square">
                                <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <rect x="2" y="2" width="16" height="16" />
                                </svg>
                                Square
                            </button>
                            <button type="button" class="shape-btn" data-shape="rounded" title="Rounded">
                                <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <rect x="2" y="2" width="16" height="16" rx="5" />
                                </svg>
                                Rounded
                            </button>
                            <button type="button" class="shape-btn" data-shape="circle" title="Circle">
                                <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <circle cx="10" cy="10" r="8" />
                                </svg>
                                Circle
                            </button>
                            <button type="button" class="shape-btn" data-shape="diamond" title="Diamond">
                                <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <polygon points="10,2 18,10 10,18 2,10" />
                                </svg>
                                Diamond
                            </button>
                            <button type="button" class="shape-btn" data-shape="star" title="Star">
                                <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <polygon
                                        points="10,2 12.4,7.8 18.5,8.2 14,12.5 15.5,18.5 10,15.2 4.5,18.5 6,12.5 1.5,8.2 7.6,7.8" />
                                </svg>
                                Star
                            </button>
                        </div>
                    </div>

                    <!-- ── Center Logo ──────────────────────────────────── -->
                    <div class="form-group">
                        <label>Center Logo</label>
                        <div class="logo-upload-area">
                            <input type="file" id="logo-upload"
                                accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml">
                            <label for="logo-upload" class="logo-upload-label">
                                <i data-lucide="image-plus" aria-hidden="true"></i>
                                <span id="logo-upload-text">Upload image or SVG</span>
                            </label>
                            <span id="logo-filename"></span>
                            <button type="button" id="logo-remove" class="hidden">
                                <i data-lucide="x" aria-hidden="true"></i> Remove
                            </button>
                        </div>
                        <div class="form-group hidden" id="logo-size-group">
                            <label for="logo-size">Logo Size</label>
                            <div class="form-range">
                                <span id="logo-size-value">20%</span>
                                <input type="range" id="logo-size" min="10" max="25" value="20" autocomplete="off">
                            </div>
                        </div>
                        <p class="form-hint">Use High or Quartile error correction for best results with logos.</p>
                    </div>

                    <div class="form-group">
                        <label for="container-radius">Container Border Radius</label>
                        <div class="form-range">
                            <span id="radius-value">5px</span>
                            <input type="range" id="container-radius" min="0" max="30" value="5" autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="container-padding">Container Padding</label>
                        <div class="form-range">
                            <span id="padding-value">8px</span>
                            <input type="range" id="container-padding" min="0" max="24" value="8" autocomplete="off">
                        </div>
                    </div>

                    <button id="reset-design">
                        <i data-lucide="rotate-ccw" aria-hidden="true"></i>Reset Design
                    </button>
                </div>

                <div class="qr-result">
                    <div id="qr-container">
                        <div id="qr-preview">
                            <div id="qr-message" class="qr-message">
                                <i data-lucide="qr-code"></i>
                                <p>Your QR code will appear here</p>
                            </div>
                        </div>
                        <div class="download-options hidden" id="download-options">
                            <button id="download-svg">
                                <i data-lucide="download" aria-hidden="true"></i>Download SVG
                            </button>
                            <button id="download-png">
                                <i data-lucide="download" aria-hidden="true"></i>Download PNG
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <a href="https://github.com/alejandroamarante/qr-generator" target="_blank" id="github-icon">
                <i data-lucide="github" title="GitHub" aria-hidden="true"></i>
            </a>
            <p><strong>QR Code</strong> is a registered trademark of <a href="https://www.qrcode.com/en/"
                    target="_blank">DENSO WAVE INCORPORATED</a></p>
        </footer>
    </div>

    <script type="module" src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            lucide.createIcons();
        });
    </script>
</body>

</html>
